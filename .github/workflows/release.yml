name: Build and Release vidlatte-server

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            artifact_name: vidlatte-server-linux-x64
          - os: ubuntu-latest
            label: docker
          - os: macos-latest
            label: macos-arm64
            artifact_name: vidlatte-server-macos-arm64.app.zip
          - os: windows-latest
            label: windows-x64
            artifact_name: vidlatte-server-windows-x64.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout release repo
        uses: actions/checkout@v4

      - name: Install Bun
        if: matrix.label != 'docker'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Clone source repository
        shell: bash
        run: git clone --depth 1 "https://gitlab.com/HttpAnimations/vidlatte.git" source

      - name: Resolve release version (Docker)
        id: docker_meta
        if: matrix.label == 'docker'
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        if: matrix.label == 'docker'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install source dependencies
        if: matrix.label != 'docker'
        shell: bash
        run: bun install --frozen-lockfile --filter '@vidlatte/relay-agent'
        working-directory: source

      - name: Build vidlatte-server
        if: matrix.label != 'docker'
        shell: bash
        run: bun run --filter '@vidlatte/relay-agent' build
        working-directory: source

      - name: Build Docker image
        if: matrix.label == 'docker'
        shell: bash
        run: |
          set -euo pipefail
          cd source/vidlatte-server
          docker build -t vidlatte-server:release .

      - name: Push Docker image to GHCR
        if: matrix.label == 'docker'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.docker_meta.outputs.version }}"
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LC}/vidlatte-server"
          docker tag vidlatte-server:release "${IMAGE}:${VERSION}"
          docker tag vidlatte-server:release "${IMAGE}:latest"
          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:latest"
          echo "Pushed ${IMAGE}:${VERSION} and ${IMAGE}:latest"

      - name: Prepare artifact (linux)
        if: runner.os == 'Linux' && matrix.label == 'linux-x64'
        shell: bash
        run: |
          mkdir -p out
          cp "source/vidlatte-server/dist/vidlatte-server" "out/${{ matrix.artifact_name }}"

      - name: Prepare artifact (macos app bundle)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_VERSION='${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}'
          BUILD_NUMBER='${{ github.run_number }}'
          APP_NAME="Vidlatte Server.app"
          APP_ROOT="out/${APP_NAME}/Contents"
          MACOS_DIR="${APP_ROOT}/MacOS"
          mkdir -p "${MACOS_DIR}"
          cp "source/vidlatte-server/dist/vidlatte-server" "${MACOS_DIR}/vidlatte-server"
          chmod +x "${MACOS_DIR}/vidlatte-server"
          cat > "${APP_ROOT}/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>vidlatte-server</string>
            <key>CFBundleIdentifier</key>
            <string>com.openlyst.vidlatte-server</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>Vidlatte Server</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${RELEASE_VERSION}</string>
            <key>CFBundleVersion</key>
            <string>${BUILD_NUMBER}</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF
          printf '%s' 'APPL????' > "${APP_ROOT}/PkgInfo"
          plutil -lint "${APP_ROOT}/Info.plist"
          # Bun --compile embeds a signature; --deep resign of the bundle then fails with
          # "invalid or unsupported format for signature". Strip and sign the Mach-O, then the bundle.
          EXE="${MACOS_DIR}/vidlatte-server"
          codesign --remove-signature "${EXE}" 2>/dev/null || true
          xattr -cr "out/${APP_NAME}" 2>/dev/null || true
          codesign --force --sign - "${EXE}"
          codesign --force --sign - "out/${APP_NAME}"
          ditto -c -k --sequesterRsrc --keepParent "out/${APP_NAME}" "out/${{ matrix.artifact_name }}"
          rm -rf "out/${APP_NAME}"

      - name: Prepare artifact (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          $candidateA = "source/vidlatte-server/dist/vidlatte-server.exe"
          $candidateB = "source/vidlatte-server/dist/vidlatte-server"
          if (Test-Path $candidateA) {
            Copy-Item $candidateA "out/${{ matrix.artifact_name }}"
          } elseif (Test-Path $candidateB) {
            Copy-Item $candidateB "out/${{ matrix.artifact_name }}"
          } else {
            Write-Error "Could not find compiled binary in source/vidlatte-server/dist"
            exit 1
          }

      - name: Upload build artifact
        if: matrix.label != 'docker'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: out/${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact files
        shell: bash
        run: |
          mkdir -p release-assets
          cp artifacts/*/* release-assets/
          ls -la release-assets

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          files: release-assets/*
          generate_release_notes: true
